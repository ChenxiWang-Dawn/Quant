name: Refresh AI Quant Lab market snapshot

on:
  schedule:
    - cron: "17 */2 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ai-quant-lab-pages
  cancel-in-progress: false

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
        working-directory: "BA 量化/ai-quant-lab/api"
      - run: python scripts/fetch_market_snapshot.py
        working-directory: "BA 量化/ai-quant-lab"
      - name: Commit updated snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "BA 量化/ai-quant-lab/web/public/snapshots/market-summary.json"
          git diff --cached --quiet || git commit -m "chore: refresh market snapshot"
          git push
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: "BA 量化/ai-quant-lab/web/package-lock.json"
      - run: npm ci && npm run build
        working-directory: "BA 量化/ai-quant-lab/web"
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_API_BASE_URL: ${{ vars.AI_QUANT_LAB_API_URL }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "BA 量化/ai-quant-lab/web/dist"
      - id: deployment
        uses: actions/deploy-pages@v4
