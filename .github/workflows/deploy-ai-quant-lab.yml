name: Deploy AI Quant Lab

on:
  push:
    branches: [main]
    paths:
      - "BA 量化/ai-quant-lab/**"
      - ".github/workflows/deploy-ai-quant-lab.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ai-quant-lab-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: "BA 量化/ai-quant-lab/web/package-lock.json"
      - run: npm ci
        working-directory: "BA 量化/ai-quant-lab/web"
      - run: npm run build
        working-directory: "BA 量化/ai-quant-lab/web"
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_API_BASE_URL: ${{ vars.AI_QUANT_LAB_API_URL }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "BA 量化/ai-quant-lab/web/dist"
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
