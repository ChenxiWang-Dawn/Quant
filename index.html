<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="refresh" content="0; url=./BA%20%E9%87%8F%E5%8C%96/ai-quant-lab/indicator-studio/" />
    <title>AI Quant Lab</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f3f5f8;
        --text: #121a24;
        --muted: #647083;
        --primary: #165dff;
        --panel: #ffffff;
        --border: #e2e7ee;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      main {
        width: min(520px, calc(100vw - 32px));
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--panel);
        padding: 28px;
        box-shadow: 0 16px 40px rgba(18, 26, 36, 0.08);
      }

      h1 {
        margin: 0;
        font-size: 24px;
        letter-spacing: 0;
      }

      p {
        margin: 10px 0 0;
        color: var(--muted);
        line-height: 1.7;
      }

      a {
        display: inline-flex;
        min-height: 38px;
        align-items: center;
        margin-top: 18px;
        border-radius: 6px;
        background: var(--primary);
        color: #fff;
        padding: 0 14px;
        text-decoration: none;
        font-weight: 650;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>AI Quant Lab</h1>
      <p>正在打开 Indicator Studio。若页面没有自动跳转，请点击下方按钮。</p>
      <a href="./BA%20%E9%87%8F%E5%8C%96/ai-quant-lab/indicator-studio/">打开网站</a>
    </main>
  </body>
</html>
